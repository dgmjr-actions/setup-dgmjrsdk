name: Prepares the repo for compilation with the DGMJR-IO SDK
author: David G. Moore, Jr., <david@dgmjr.io>
description: Prepares the repo for compilation with the DGMJR-IO SDK

branding:
  icon: file-plus
  color: green

inputs:
  environment:
    type: string
    default: Local
    required: false
  token:
    type: string
    required: true
  git-nuget-endpoint:
    type: string
    required: false
    default: https://nuget.pkg.github.com/dgmjr-io/index.json
  private-nuget-endpoint:
    type: string
    required: false
    default: https://nuget.dgmjr.io/index.json

runs:
  using: composite
  steps:
    - id: Setup-dotnet
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - id: Restore-dotnet-file
      uses: dgmjr-actions/download-global.json@main
      with:
        token: ${{ inputs.token }}
    - id: Setup-NuGet
      uses: NuGet/setup-nuget@v1.2.0
    - id: Setup-GitHub-Packages-NuGet-Source
      run: dotnet nuget add source ${{ inputs.git-nuget-endpoint }} --name GitHub --password ${{ inputs.token }} --store-password-in-clear-text
    - id: Setup-Azure-Blobs-NuGet
      run: dotnet nuget add source ${{ inputs.private-nuget-endpoint }} --name dgmjr-io
      shell: bash
